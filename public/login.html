<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scatter Medallions</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .auth-card {
    width: 100%;
    max-width: 380px;
    padding: 36px 32px 30px;
    position: relative;
    overflow: hidden;
  }
  .auth-card::before {
    content: '';
    position: absolute;
    top: -60%;
    left: -20%;
    width: 140%;
    height: 140%;
    background: radial-gradient(circle, rgba(228,180,84,0.10), transparent 60%);
    pointer-events: none;
  }
  .logo-mark {
    width: 84px;
    height: 84px;
    margin: 0 auto 14px;
  }
  h1.title {
    font-family: var(--font-display);
    font-size: 24px;
    text-align: center;
    margin: 0 0 2px;
    letter-spacing: 0.03em;
    color: var(--gold-bright);
  }
  .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 26px;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .tabs {
    display: flex;
    margin-bottom: 22px;
    border: 1px solid var(--panel-line);
    border-radius: 10px;
    overflow: hidden;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-family: var(--font-body);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    background: var(--void);
  }
  .tab.active { background: var(--panel-raised); color: var(--gold-bright); }
  .submit-btn { width: 100%; margin-top: 6px; font-size: 15px; padding: 13px; }
  .fine-print {
    text-align: center;
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 20px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="auth-wrap">
    <div class="panel auth-card">
      <div class="medallion logo-mark">
        <img src="/assets/icons/sym_scatter.svg" alt="Scatter Medallions" />
      </div>
      <h1 class="title">Scatter Medallions</h1>
      <div class="subtitle">Free-to-play &middot; No purchases &middot; Just for fun</div>

      <div class="tabs">
        <div class="tab active" data-mode="login">Log In</div>
        <div class="tab" data-mode="signup">Sign Up</div>
      </div>

      <form id="authForm">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>
        <div class="error-text" id="errorText"></div>
        <button type="submit" class="btn btn-primary submit-btn" id="submitBtn">Log In</button>
      </form>

      <div class="fine-print" id="finePrint">
        New players start with free play credits automatically.<br/>
        No real money, no purchases, no cash-out — for fun only.
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
