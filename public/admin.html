<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin · Scatter Medallions</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
  .app { min-height: 100vh; padding: 24px; max-width: 1000px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .title { font-family: var(--font-display); color: var(--gold-bright); font-size: 22px; }
  .note {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 18px;
    line-height: 1.6;
    border-left: 2px solid var(--panel-line);
    padding-left: 12px;
  }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-num); font-size: 14px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--panel-line); }
  th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.06em; }
  tr:hover td { background: rgba(228,180,84,0.04); }
  .credits-col { color: var(--gold-bright); font-weight: 700; }
  .empty { text-align: center; color: var(--text-muted); padding: 40px 0; }
  .refresh-row { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
  .stat-cards { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { padding: 14px 18px; min-width: 140px; }
  .stat-card .label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.06em; }
  .stat-card .value { font-family: var(--font-num); font-size: 22px; color: var(--gold-bright); font-weight: 700; margin-top: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">Player Dashboard</div>
    <a class="logout-link" id="logoutLink" style="cursor:pointer;">Log out</a>
  </div>

  <div class="note">
    Read-only view. Every account starts with the same fixed free credits at sign-up,
    and can only top up through the player's own daily bonus — there is no control
    here to set or add credits to an account.
  </div>

  <div class="stat-cards" id="statCards"></div>

  <div class="refresh-row">
    <button class="btn" id="refreshBtn">Refresh</button>
    <span class="error-text" id="adminError"></span>
  </div>

  <div class="panel" style="padding: 6px 14px;">
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Credits</th>
          <th>Spins</th>
          <th>Wagered</th>
          <th>Won</th>
          <th>Joined</th>
        </tr>
      </thead>
      <tbody id="usersBody"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none;">No players yet.</div>
  </div>
</div>
<script src="/js/admin.js"></script>
</body>
</html>
